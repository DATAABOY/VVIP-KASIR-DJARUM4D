<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENERATOR LAPORAN ABOY - LUXURY EDITION</title>
    <style>
        /* ==========================================================================
           TEMA LUXURY CYBERPUNK - SOLID NEON GLOW LIGHTS WITH TOP LOGO GIF
           ========================================================================== */

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 50% 0%, #1a0836 0%, #07030d 70%, #020105 100%);
            background-attachment: fixed;
            color: #f1f1f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Container Utama dengan Efek Lampu Neon Border */
        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(11, 5, 18, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 35px;
            border-radius: 20px;
            
            /* Gabungan Lampu Box-Shadow Luar Dalam */
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.8),
                0 15px 50px rgba(0, 0, 0, 0.9),
                0 0 30px rgba(214, 51, 255, 0.2), /* Lampu Ungu Samping */
                inset 0 0 15px rgba(152, 113, 245, 0.15);
                
            border: 1px solid rgba(214, 51, 255, 0.4); /* Garis Lampu Neon */
            position: relative;
            overflow: hidden;
        }

        /* Elemen Pembungkus Logo GIF Atas */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 25px;
            padding-bottom: 10px;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            max-height: 90px; /* Batas tinggi maksimal agar pas dan proporsional */
            filter: drop-shadow(0 0 12px rgba(214, 51, 255, 0.4)); /* Efek pendaran lampu pada logo */
        }

        /* Efek Lampu Sorot Ambient Atas */
        .container::before {
            content: "";
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 300px;
            background: radial-gradient(circle, rgba(214, 51, 255, 0.25) 0%, rgba(214, 51, 255, 0) 70%);
            pointer-events: none;
        }

        /* Judul Dengan Efek Lampu Text-Glow */
        h2 {
            margin-top: 0;
            color: #ffffff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(214, 51, 255, 0.3);
            padding-bottom: 15px;
            text-transform: uppercase;
            text-align: center;
            
            /* Lampu Teks Menyala */
            text-shadow: 
                0 0 8px rgba(214, 51, 255, 0.8), 
                0 0 20px rgba(214, 51, 255, 0.4),
                0 0 40px rgba(152, 113, 245, 0.2);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: #d6c7ee;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(152, 113, 245, 0.3);
        }

        /* Textarea Matte Gelap */
        textarea {
            width: 100%;
            height: 130px;
            padding: 16px;
            background-color: #050208;
            border: 1px solid rgba(152, 113, 245, 0.4);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            box-sizing: border-box;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.9);
        }

        /* Lampu Sorot Saat Input Aktif */
        textarea:focus {
            outline: none;
            border-color: #d633ff;
            background-color: #08030f;
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.9),
                0 0 15px rgba(214, 51, 255, 0.5);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        button {
            flex: 1;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.97);
        }

        /* Tombol Submit Berlampu Neon Ungu Magis */
        .btn-submit {
            background: linear-gradient(135deg, #9857f2 0%, #d633ff 100%);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(214, 51, 255, 0.4);
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #a66df5 0%, #e04eff 100%);
            box-shadow: 
                0 0 25px rgba(214, 51, 255, 0.7),
                0 0 50px rgba(214, 51, 255, 0.3);
        }

        /* Tombol Reset Muted Lampu Ringan */
        .btn-reset {
            background-color: #160d26;
            color: #bfaed6;
            border: 1px solid rgba(152, 113, 245, 0.4);
        }

        .btn-reset:hover {
            background-color: #21133b;
            color: #ffffff;
            border-color: rgba(214, 51, 255, 0.7);
            box-shadow: 0 0 15px rgba(152, 113, 245, 0.2);
        }

        .output-section {
            border-top: 2px solid rgba(214, 51, 255, 0.25);
            padding-top: 25px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .output-title {
            font-size: 19px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* Tombol Salin - Lampu Neon Listrik Electric Cyan */
        .btn-copy-all {
            background: transparent;
            color: #00f0ff;
            border: 1px solid #00f0ff;
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 8px;
            flex: none;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
        }

        .btn-copy-all:hover {
            background-color: #00f0ff;
            color: #020105;
            box-shadow: 
                0 0 25px rgba(0, 240, 255, 0.7),
                0 0 50px rgba(0, 240, 255, 0.3);
        }

        /* Wadah Tabel Berlampu Border Cyan */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(0, 240, 255, 0.4); 
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.6),
                0 0 15px rgba(0, 240, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #0a0512;
        }

        /* Header Tabel - Solid Lampu Cyan Menyala */
        th {
            background: linear-gradient(180deg, #00f0ff 0%, #00b9cc 100%);
            color: #020105;
            font-weight: 800;
            text-transform: uppercase;
            padding: 16px 18px;
            text-align: left;
            font-size: 13px;
            letter-spacing: 1px;
            border: 1px solid #020105;
            text-shadow: 0 1px 1px rgba(255,255,255,0.2);
        }

        td {
            padding: 14px 18px;
            border: 1px solid rgba(152, 113, 245, 0.2);
            color: #e4dff0;
            font-size: 14px;
            font-weight: 500;
        }

        tr:nth-child(even) {
            background-color: #0b0514;
        }

        tr:nth-child(odd) {
            background-color: #10071f;
        }

        /* Lampu Sorot Baris Data Saat Kursor Lewat */
        tr:hover {
            background-color: rgba(214, 51, 255, 0.15) !important;
            box-shadow: inset 0 0 8px rgba(214, 51, 255, 0.2);
        }

        /* Jumlah - Angka Menyala Neon Cyan Tajam */
        .glow-amount {
            color: #00f0ff; 
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        .empty-message {
            color: #8c7b9c;
            font-style: italic;
            text-align: center;
            padding: 40px;
            background-color: #060309 !important;
            font-size: 14px;
        }

        /* Pop-up Toast Super Glowing */
        .toast {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00f0ff 0%, #00b9cc 100%);
            color: #020105;
            padding: 16px 32px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 
                0 10px 30px rgba(0, 240, 255, 0.5),
                0 0 20px rgba(0, 240, 255, 0.3);
            z-index: 1000;
            animation: slideInHD 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideInHD {
            from { transform: translateY(30px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="https://cdn.bunkerkiamat.com/djarum4d/images/logo/Djarum4d.gif" alt="Djarum4d Logo">
        </div>

        <h2>RUMUS WITHDRAW FLOP DJARUM4D</h2>
        
        <div class="form-group">
            <label for="inputData">Tempel Report Withdraw Dibawah !!! :</label>
            <textarea id="inputData" placeholder="Tempel report wd di sini...
By : CS9 👾"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-reset" onclick="resetInput()">Reset Input</button>
            <button class="btn-submit" onclick="submitData()">Submit Data</button>
        </div>

        <div class="output-section">
            <div class="output-header">
                <div class="output-title">Data Terurai Otomatis:</div>
                <button class="btn-copy-all" onclick="copyAllTableData()">Salin Semua Hasil Ekspor</button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 15%;">WAKTU</th>
                            <th style="width: 20%;">Used ID</th>
                            <th style="width: 35%;">Tujuan Bank</th>
                            <th style="width: 15%;"></th>
                            <th style="width: 15%;">Jumlah</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr id="emptyRow">
                            <td colspan="5" class="empty-message">Belum ada data yang dimasukkan.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toastNotification" class="toast">Data Siap Ditempel (Paste) ke Sheet!</div>

    <script>
        function submitData() {
            const inputField = document.getElementById('inputData');
            const tableBody = document.getElementById('tableBody');
            const emptyRow = document.getElementById('emptyRow');
            
            let rawText = inputField.value.trim();

            if (rawText === "") {
                alert("Kolom data masih kosong! Silakan isi terlebih dahulu.");
                return;
            }

            if (emptyRow) {
                emptyRow.remove();
            }

            const blocks = rawText.split('ACCEPT');
            let dataFound = false;

            blocks.forEach(block => {
                if (block.includes('Withdraw')) {
                    dataFound = true;

                    const parts = block.split('Withdraw');
                    const kiriWithdraw = parts[0].trim();  
                    const kananWithdraw = parts[1].trim(); 

                    const timeMatch = kiriWithdraw.match(/\d{2}:\d{2}:\d{2}/);
                    let waktu = "-";
                    let userId = "-";

                    if (timeMatch) {
                        waktu = timeMatch[0]; 
                        const indexWaktu = kiriWithdraw.indexOf(waktu);
                        userId = kiriWithdraw.substring(indexWaktu + waktu.length).trim();
                    }

                    const indexMinus = kananWithdraw.lastIndexOf('-');
                    let tujuanBank = "-";
                    let jumlah = "-";
                    let kolomKosong = ""; 

                    if (indexMinus !== -1) {
                        tujuanBank = kananWithdraw.substring(0, indexMinus).trim();
                        jumlah = kananWithdraw.substring(indexMinus + 1).trim();
                    } else {
                        tujuanBank = kananWithdraw;
                    }

                    const newRow = document.createElement('tr');
                    newRow.setAttribute('data-waktu', waktu);
                    newRow.setAttribute('data-userid', userId);
                    newRow.setAttribute('data-bank', tujuanBank);
                    newRow.setAttribute('data-kosong', kolomKosong);
                    newRow.setAttribute('data-jumlah', jumlah);

                    newRow.innerHTML = `
                        <td>${waktu}</td>
                        <td>${userId}</td>
                        <td>${tujuanBank}</td>
                        <td>${kolomKosong}</td>
                        <td class="glow-amount">${jumlah}</td>
                    `;

                    tableBody.insertBefore(newRow, tableBody.firstChild);
                }
            });

            if (!dataFound) {
                alert("Format data tidak dikenali. Pastikan teks mengandung kata 'Withdraw' dan 'ACCEPT'.");
                return;
            }

            inputField.value = "";
            inputField.focus();
        }

        function copyAllTableData() {
            const tableBody = document.getElementById('tableBody');
            const rows = tableBody.querySelectorAll('tr');

            if (rows.length === 0 || document.getElementById('emptyRow')) {
                alert("Tidak ada data hasil ekspor yang bisa disalin!");
                return;
            }

            let linesToCopy = [];

            rows.forEach(row => {
                const waktu = row.getAttribute('data-waktu');
                const userId = row.getAttribute('data-userid');
                const bank = row.getAttribute('data-bank');
                const kosong = row.getAttribute('data-kosong');
                const jumlah = row.getAttribute('data-jumlah');

                if (waktu) {
                    linesToCopy.push(`${waktu}\t${userId}\t${bank}\t${kosong}\t${jumlah}`);
                }
            });

            const textToCopy = linesToCopy.join('\n');
            navigator.clipboard.writeText(textToCopy);
            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toastNotification');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        function resetInput() {
            const inputField = document.getElementById('inputData');
            const tableBody = document.getElementById('tableBody');
            
            inputField.value = "";
            
            tableBody.innerHTML = `
                <tr id="emptyRow">
                    <td colspan="5" class="empty-message">Belum ada data yang dimasukkan.</td>
                </tr>
            `;
            
            inputField.focus();
        }
    </script>

</body>
</html>
