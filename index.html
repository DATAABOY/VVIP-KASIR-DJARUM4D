<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard HS Group - Professional</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; background: #000; }

        /* --- SIDEBAR DENGAN GIF --- */
        .sidebar {
            width: 320px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            position: relative;
            background: url('https://media.giphy.com/media/jaOXKCxtBPLieRLI0c/giphy.gif') center/cover no-repeat;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1;
        }

        .content-wrapper { position: relative; z-index: 2; }

        .user-header { margin-bottom: 30px; color: #fff; }
        .user-header h2 { font-size: 1.1rem; letter-spacing: 1px; }
        .user-header p { color: #00e5ff; font-weight: bold; margin-top: 5px; }

        .menu-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ddd;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
        }
        .menu-item:hover {
            background: rgba(0, 229, 255, 0.2);
            border-color: #00e5ff;
            color: #fff;
        }

        /* --- MAIN CONTENT & ANIMASI LOGO --- */
        .main-content {
            flex-grow: 1;
            background: url('https://i.postimg.cc/J41fb07j/038a2c4268dd6724816fdaa2525b8798.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        .logo-img { 
            width: 400px; 
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            /* Animasi Masuk */
            animation: slideDown 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-50px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
